name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - name: Build release APK
        working-directory: android-app
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          HOMELABTV_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          HOMELABTV_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          HOMELABTV_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > release.keystore
            export HOMELABTV_KEYSTORE="$PWD/release.keystore"
            echo "Signing with release keystore"
          else
            echo "No signing secrets configured - APK will be debug-signed"
          fi
          ./gradlew assembleRelease --console=plain
          cp app/build/outputs/apk/release/app-release.apk "../homelabtv-${GITHUB_REF_NAME}.apk"
      - uses: softprops/action-gh-release@v2
        with:
          files: homelabtv-*.apk
          generate_release_notes: true
